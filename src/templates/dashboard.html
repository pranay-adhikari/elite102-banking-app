<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="dashboard">
    <h2>Dashboard</h2>

    <div class="balance">
        Balance: ${{ balance }}
    </div>

    <form method="POST">
        <input name="amount" type="number" step="0.01" placeholder="Enter amount" required>

        <div class="actions">
            <button name="action" value="deposit">Deposit</button>
            <button name="action" value="withdraw">Withdraw</button>
        </div>
    </form>

    <a href="/logout">Logout</a>
</div>

</body>
</html>
